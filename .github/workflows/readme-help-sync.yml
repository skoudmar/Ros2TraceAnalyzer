name: README CLI help sync

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

concurrency:
  group: >
    ${{ github.workflow }}-
    ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  readme-help-sync:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbabeltrace2-dev libfreetype6-dev libfontconfig1-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install mdsh
        run: cargo install --locked mdsh

      - name: Check README CLI help sync
        run: mdsh --frozen -i README.md
