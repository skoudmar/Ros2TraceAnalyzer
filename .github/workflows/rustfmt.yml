name: fmt (nightly)

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Optional note for why this run was started"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: >
    ${{ github.workflow }}-
    ${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --check
